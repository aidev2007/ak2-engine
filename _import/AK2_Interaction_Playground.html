<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AK² Asset Architect - Interaction Playground</title>
  <style>
    :root {
      --bg-color: #0b0b0f;
      --card-bg: #14141c;
      --text-main: #f0f0f5;
      --text-sub: #777788;
      --accent: #00ffcc;
    }

    /* 独自カーソルを使用するため、全体のデフォルトカーソルを非表示に */
    /* 削除: * { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; } */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* =========================================
       1. Custom Cursor & Magnetic
       ========================================= */
    /* 特定のエリア（data-custom-cursor）内でのみデフォルトカーソルを非表示に */
    [data-custom-cursor] { cursor: none; }

    .ak2-cursor-dot, .ak2-cursor-ring {
      position: fixed; top: 0; left: 0;
      border-radius: 50%; pointer-events: none; z-index: 9999;
      transform: translate(-50%, -50%);
      opacity: 0; /* 初期状態は非表示 */
      transition: opacity 0.3s; /* 表示・非表示のトランジション */
    }
    .ak2-cursor-dot {
      width: 6px; height: 6px; background-color: var(--accent);
      transition: width 0.2s, height 0.2s, opacity 0.3s;
    }
    .ak2-cursor-ring {
      width: 36px; height: 36px;
      border: 1px solid rgba(0, 255, 204, 0.4);
      transition: width 0.3s, height 0.3s, background-color 0.3s, border-color 0.3s, opacity 0.3s;
      /* Lerp演算をJSで行うため transform の transition はかけない */
    }

    /* カーソルが対象エリア内にある時のスタイル */
    body.is-custom-cursor .ak2-cursor-dot, 
    body.is-custom-cursor .ak2-cursor-ring {
      opacity: 1;
    }

    /* カーソルがホバー状態の時のスタイル */
    .ak2-cursor-dot.is-hover { width: 0; height: 0; }
    .ak2-cursor-ring.is-hover {
      width: 60px; height: 60px;
      background-color: rgba(0, 255, 204, 0.1);
      border-color: transparent;
      backdrop-filter: blur(2px);
    }

    /* マグネット適用要素のスタイル */
    [data-magnetic] { display: inline-block; transition: transform 0.1s linear; }
    .magnetic-btn {
      padding: 16px 40px; border-radius: 30px;
      background: transparent; border: 1px solid var(--text-sub);
      color: var(--text-main); font-size: 14px; letter-spacing: 2px; text-transform: uppercase;
      transition: border-color 0.3s, color 0.3s, background-color 0.3s;
    }
    .magnetic-btn:hover { border-color: var(--accent); color: var(--bg-color); background: var(--accent); }

    /* =========================================
       2. Hero Section (Kinetic Particle)
       ========================================= */
    .hero-section {
      position: relative; width: 100vw; height: 100vh;
      display: flex; justify-content: center; align-items: center;
      overflow: hidden;
    }
    #hero-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    .hero-content {
      position: relative; z-index: 2; text-align: center; pointer-events: none;
    }
    .hero-content p { font-size: 16px; letter-spacing: 6px; color: var(--accent); margin-bottom: 20px; opacity: 0.8; }

    /* =========================================
       3. Kinetic Card UI
       ========================================= */
    .cards-section {
      padding: 120px 40px; max-width: 1200px; margin: 0 auto;
    }
    .section-title { font-size: 32px; font-weight: 300; letter-spacing: 4px; margin-bottom: 60px; text-align: center; }

    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 40px;
    }

    .ak2-kinetic-card {
      position: relative; height: 400px; border-radius: 16px;
      background-color: var(--card-bg); border: 1px solid rgba(255,255,255,0.05);
      overflow: hidden; transform-style: preserve-3d;
      display: flex; flex-direction: column;
      /* js側でtransformを操作。初期状態のtransitionはホバーアウト時用 */
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    
    /* 追加: 画像コンテナレイヤー */
    .ak2-kinetic-card-img-wrap {
      position: relative; width: 100%; height: 50%;
      transform-style: preserve-3d;
    }

    /* 追加: 画像レイヤー */
    .ak2-kinetic-card-img {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      object-fit: cover;
      /* 画像を奥に配置し、少し大きくしておくことでパララックスの余白を確保 */
      transform: translateZ(-20px) scale(1.05);
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), filter 0.6s ease;
      /* デフォルトの明るさ */
      filter: brightness(1); 
    }
    
    /* ホバー時の画像演出 */
    .ak2-kinetic-card:hover .ak2-kinetic-card-img {
      filter: brightness(1.2); /* 明度を上げる */
      /* マウスの動きとは別に、全体として少しズームする */
      transform: translateZ(-20px) scale(1.1);
    }

    /* 内部のテキストも3Dで浮かせる */
    .ak2-kinetic-card-content { 
      padding: 30px; height: 50%;
      background-color: var(--card-bg); /* 画像のはみ出しを隠し、テキストの可読性を確保 */
      transform: translateZ(40px); 
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); 
    }
    .ak2-kinetic-card h3 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
    .ak2-kinetic-card p { font-size: 14px; color: var(--text-sub); line-height: 1.6; }

    /* 光の反射（Glare）レイヤー */
    .ak2-glare-wrap {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      overflow: hidden; border-radius: 16px; pointer-events: none;
      /* 画像の上に光沢が乗るようにz-indexを調整 */
      z-index: 10;
    }
    .ak2-glare {
      position: absolute; top: 50%; left: 50%; width: 200%; height: 200%;
      background: radial-gradient(circle at center, rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 60%);
      transform: translate(-50%, -50%); opacity: 0;
      transition: opacity 0.4s ease;
    }

    /* =========================================
       4. Liquid Page Transition
       ========================================= */
    .transition-section {
      padding: 120px 40px; text-align: center; background: #07070a;
    }
    
    /* 画面全体を覆うオーバーレイレイヤー */
    .ak2-transition-overlay {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      pointer-events: none; z-index: 10000;
      display: flex; align-items: flex-end; /* 下から上へ */
    }
    .ak2-transition-overlay svg {
      width: 100%; height: 100%;
    }

  </style>
</head>
<body>

  <!-- Custom Cursor Elements -->
  <div class="ak2-cursor-dot" id="cursor-dot"></div>
  <div class="ak2-cursor-ring" id="cursor-ring"></div>

  <!-- Hero Section -->
  <!-- data-custom-cursor属性を追加し、このセクションのみカスタムカーソルを有効化 -->
  <section class="hero-section" data-custom-cursor>
    <canvas id="hero-canvas"></canvas>
    <div class="hero-content">
      <p>INTERACTIVE ECOSYSTEM</p>
      <!-- Canvasでパーティクル化する文字。AK²Labに変更 -->
      <h1 id="hero-title" style="opacity: 0; font-size: 10vw; letter-spacing: 8px;">AK²Lab</h1>
    </div>
  </section>

  <!-- Kinetic Cards Section -->
  <section class="cards-section">
    <h2 class="section-title" data-magnetic>EXPERTISE</h2>
    <div class="cards-grid">
      
      <div class="ak2-kinetic-card">
        <div class="ak2-glare-wrap"><div class="ak2-glare"></div></div>
        <div class="ak2-kinetic-card-img-wrap">
          <img src="https://images.unsplash.com/photo-1550745165-9bc0b252726f?q=80&w=600&auto=format&fit=crop" alt="Architecture" class="ak2-kinetic-card-img">
        </div>
        <div class="ak2-kinetic-card-content">
          <h3>Architecture</h3>
          <p>複雑な状態管理をシンプルなクラスにカプセル化し、堅牢で拡張性の高いフロントエンド基盤を構築します。</p>
        </div>
      </div>

      <div class="ak2-kinetic-card">
        <div class="ak2-glare-wrap"><div class="ak2-glare"></div></div>
        <div class="ak2-kinetic-card-img-wrap">
          <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop" alt="Motion Design" class="ak2-kinetic-card-img">
        </div>
        <div class="ak2-kinetic-card-content">
          <h3>Motion Design</h3>
          <p>物理演算に基づいた自然なイージングと、残像効果を用いた視覚的なフィードバックを実装します。</p>
        </div>
      </div>

      <div class="ak2-kinetic-card">
        <div class="ak2-glare-wrap"><div class="ak2-glare"></div></div>
        <div class="ak2-kinetic-card-img-wrap">
          <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=600&auto=format&fit=crop" alt="Performance" class="ak2-kinetic-card-img">
        </div>
        <div class="ak2-kinetic-card-content">
          <h3>Performance</h3>
          <p>不要なDOM操作を避け、CanvasやWebGLを活用したGPUアクセラレーションで60fpsの体験を保証します。</p>
        </div>
      </div>

    </div>
  </section>

  <!-- Page Transition Section -->
  <section class="transition-section">
    <p style="margin-bottom: 30px; color: var(--text-sub);">クリックで流体的な画面遷移を発火させます。</p>
    <button class="magnetic-btn" id="btn-transition" data-magnetic>Initialize Sequence</button>
  </section>

  <!-- Transition SVG Overlay -->
  <div class="ak2-transition-overlay">
    <!-- viewBoxはJSで動的に設定。preserveAspectRatio="none" で画面いっぱいに変形させる -->
    <svg id="transition-svg" preserveAspectRatio="none">
      <path id="transition-path" fill="#00ffcc" d=""></path>
    </svg>
  </div>

  <script>
    /**
     * AK² Asset Architect - Interactive Ecosystem
     * Utility
     */
    const MathUtils = {
      lerp: (a, b, n) => (1 - n) * a + n * b,
      map: (val, in_min, in_max, out_min, out_max) => (val - in_min) * (out_max - out_min) / (in_max - in_min) + out_min
    };

    /**
     * グローバルなマウス座標（各アセットで共有）
     */
    const Mouse = { x: window.innerWidth / 2, y: window.innerHeight / 2 };
    window.addEventListener('mousemove', (e) => {
      Mouse.x = e.clientX;
      Mouse.y = e.clientY;
    });

    // =========================================
    // Asset 1: Custom Cursor & Magnetic Controller
    // =========================================
    class CursorController {
      constructor() {
        this.dot = document.getElementById('cursor-dot');
        this.ring = document.getElementById('cursor-ring');
        this.magnetics = document.querySelectorAll('[data-magnetic], a, button');
        this.customCursorAreas = document.querySelectorAll('[data-custom-cursor]');
        
        // リングの遅延用座標
        this.ringX = Mouse.x;
        this.ringY = Mouse.y;
        this.isActive = false;

        this.init();
      }

      init() {
        // カスタムカーソルエリアの出入りで表示・非表示を切り替え
        this.customCursorAreas.forEach(area => {
          area.addEventListener('mouseenter', () => {
            this.isActive = true;
            document.body.classList.add('is-custom-cursor');
          });
          area.addEventListener('mouseleave', () => {
            this.isActive = false;
            document.body.classList.remove('is-custom-cursor');
          });
        });

        // ホバーエフェクトのバインディング
        this.magnetics.forEach(el => {
          el.addEventListener('mouseenter', () => this.addHoverState());
          el.addEventListener('mouseleave', () => this.removeHoverState(el));
          
          // data-magnetic属性があるものは、要素自体もマウスに吸い付く
          if (el.hasAttribute('data-magnetic')) {
            el.addEventListener('mousemove', (e) => this.magnetize(e, el));
          }
        });

        this.render();
      }

      addHoverState() {
        this.dot.classList.add('is-hover');
        this.ring.classList.add('is-hover');
      }

      removeHoverState(el) {
        this.dot.classList.remove('is-hover');
        this.ring.classList.remove('is-hover');
        if (el.hasAttribute('data-magnetic')) {
          el.style.transform = `translate(0px, 0px)`;
        }
      }

      magnetize(e, el) {
        const rect = el.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;
        const x = (e.clientX - centerX) * 0.3; // 吸い付く強さ
        const y = (e.clientY - centerY) * 0.3;
        el.style.transform = `translate(${x}px, ${y}px)`;
      }

      render = () => {
        // Dotは遅延なしで追従
        if (this.isActive) {
          this.dot.style.transform = `translate(calc(${Mouse.x}px - 50%), calc(${Mouse.y}px - 50%))`;
          
          // RingはLerpで滑らかに追従
          this.ringX = MathUtils.lerp(this.ringX, Mouse.x, 0.15);
          this.ringY = MathUtils.lerp(this.ringY, Mouse.y, 0.15);
          this.ring.style.transform = `translate(calc(${this.ringX}px - 50%), calc(${this.ringY}px - 50%))`;
        } else {
          // エリア外の時はリングの位置をマウスに即座に合わせておく（次回入った時にジャンプさせないため）
          this.ringX = Mouse.x;
          this.ringY = Mouse.y;
        }

        requestAnimationFrame(this.render);
      }
    }

    // =========================================
    // Asset 2: Kinetic Text Particle Hero
    // =========================================
    class TextParticleEngine {
      constructor(canvasId, textId) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d', { willReadFrequently: true });
        this.textElement = document.getElementById(textId);
        this.particles = [];
        this.text = this.textElement.innerText;
        
        this.resize();
        window.addEventListener('resize', () => this.resize());
        this.render();
      }

      resize() {
        this.w = window.innerWidth;
        this.h = window.innerHeight;
        // Retina対応
        const dpr = window.devicePixelRatio || 1;
        this.canvas.width = this.w * dpr;
        this.canvas.height = this.h * dpr;
        this.ctx.scale(dpr, dpr);
        
        this.createParticles();
      }

      createParticles() {
        this.particles = [];
        this.ctx.clearRect(0, 0, this.w, this.h);
        
        // 1. HTML側の要素からフォントスタイル（family, weight）を自動取得
        const computedStyle = window.getComputedStyle(this.textElement);
        const fontFamily = computedStyle.fontFamily;
        const fontWeight = computedStyle.fontWeight;

        // オフスクリーンに文字を描画してピクセルデータを取得
        const fontSize = Math.min(this.w * 0.15, 200); // 画面幅に合わせたフォントサイズ
        
        // 2. 取得したCSSのフォント設定をCanvasに適用
        this.ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
        this.ctx.fillStyle = '#ffffff';
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        this.ctx.fillText(this.text, this.w / 2, this.h / 2);

        const imgData = this.ctx.getImageData(0, 0, this.canvas.width, this.canvas.height).data;
        this.ctx.clearRect(0, 0, this.w, this.h);

        // DPRを考慮したサンプリング間隔
        const step = Math.floor((window.devicePixelRatio || 1) * 6); 

        for (let y = 0; y < this.canvas.height; y += step) {
          for (let x = 0; x < this.canvas.width; x += step) {
            const index = (y * this.canvas.width + x) * 4;
            const alpha = imgData[index + 3];
            if (alpha > 128) {
              // 実際の論理座標に直してパーティクルを生成
              const posX = x / (window.devicePixelRatio || 1);
              const posY = y / (window.devicePixelRatio || 1);
              this.particles.push({
                x: posX + (Math.random() - 0.5) * 100, // 初期は少し散らしておく
                y: posY + (Math.random() - 0.5) * 100,
                baseX: posX,
                baseY: posY,
                vx: 0, vy: 0,
                size: Math.random() * 1.5 + 0.5
              });
            }
          }
        }
      }

      render = () => {
        this.ctx.clearRect(0, 0, this.w, this.h);
        
        // アクセントカラーの取得
        const rootStyles = getComputedStyle(document.documentElement);
        const accent = rootStyles.getPropertyValue('--accent').trim() || '#00ffcc';
        
        this.ctx.fillStyle = accent;
        this.ctx.beginPath();

        this.particles.forEach(p => {
          // マウスとの距離による反発力
          const dx = Mouse.x - p.x;
          const dy = Mouse.y - p.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const maxDist = 100; // 反発が効く距離
          
          if (dist < maxDist) {
            const force = (maxDist - dist) / maxDist;
            p.vx -= (dx / dist) * force * 5; // 反発力
            p.vy -= (dy / dist) * force * 5;
          }

          // 元の位置（ベース座標）へ戻ろうとする力（スプリング）
          p.vx += (p.baseX - p.x) * 0.05;
          p.vy += (p.baseY - p.y) * 0.05;

          // 摩擦
          p.vx *= 0.85;
          p.vy *= 0.85;

          p.x += p.vx;
          p.y += p.vy;

          // 四角形として描画（円より軽量）
          this.ctx.rect(p.x, p.y, p.size, p.size);
        });

        this.ctx.fill();
        requestAnimationFrame(this.render);
      }
    }

    // =========================================
    // Asset 3: Kinetic 3D Tilt Card
    // =========================================
    class KineticCard {
      constructor(el) {
        this.el = el;
        this.content = el.querySelector('.ak2-kinetic-card-content');
        this.glare = el.querySelector('.ak2-glare');
        this.rect = null;
        
        this.el.addEventListener('mouseenter', () => this.onEnter());
        this.el.addEventListener('mousemove', (e) => this.onMove(e));
        this.el.addEventListener('mouseleave', () => this.onLeave());
      }

      onEnter() {
        this.rect = this.el.getBoundingClientRect();
        this.el.style.transition = 'none'; // 動かしている間はtransitionを切る
        this.content.style.transition = 'none';
        if(this.glare) this.glare.style.opacity = '1';
      }

      onMove(e) {
        if (!this.rect) return;
        const x = e.clientX - this.rect.left;
        const y = e.clientY - this.rect.top;
        
        // 中心からの相対位置（-1 〜 1）
        const px = (x / this.rect.width) * 2 - 1;
        const py = (y / this.rect.height) * 2 - 1;

        // 回転の強さ
        const maxRot = 15; // 度
        const rotateX = -py * maxRot;
        const rotateY = px * maxRot;

        this.el.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        
        // コンテンツをさらに浮かせる
        this.content.style.transform = `translateZ(50px) translateX(${px * 10}px) translateY(${py * 10}px)`;

        // Glare（光）の移動
        if(this.glare) {
          const glareX = (x / this.rect.width) * 100;
          const glareY = (y / this.rect.height) * 100;
          this.glare.style.transform = `translate(-50%, -50%) translate(${glareX}%, ${glareY}%)`;
        }
      }

      onLeave() {
        this.el.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        this.content.style.transition = 'transform 0.6s cubic-bezier(0.23, 1, 0.32, 1)';
        this.el.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        this.content.style.transform = `translateZ(40px)`;
        if(this.glare) {
          this.glare.style.opacity = '0';
          this.glare.style.transform = `translate(-50%, -50%)`;
        }
      }
    }

    // =========================================
    // Asset 4: Liquid Page Transition
    // =========================================
    class TransitionManager {
      constructor(btnId, svgId, pathId) {
        this.btn = document.getElementById(btnId);
        this.svg = document.getElementById(svgId);
        this.path = document.getElementById(pathId);
        this.isAnimating = false;
        
        // アニメーションのパラメータ
        this.progress = 0;
        
        this.btn.addEventListener('click', () => this.trigger());
      }

      // 0〜1の進行度から、波打つSVGパス文字列を生成する関数
      getPath(progress) {
        // preserveAspectRatio="none" なので論理座標 100x100 で描画する
        const w = 100;
        const h = 100;
        
        // progress: 0(下部待機) -> 1(全画面覆う)
        // イージングをかけて滑らかに
        const easeProg = 1 - Math.pow(1 - progress, 3); 
        
        // Y座標のベース（下から上へ: 100 -> 0）
        const baseY = 100 - (100 * easeProg);
        
        // 波の高さ（アニメーション中盤で最大になり、最初と最後は平らになる）
        const waveHeight = Math.sin(progress * Math.PI) * 20;

        // パスの構成:
        // 左下(0,100) -> 左上の波開始点 -> 制御点を使って波打ちながら右上 -> 右下(100,100) -> 閉じる
        const d = `
          M 0 100
          L 0 ${baseY}
          Q 25 ${baseY - waveHeight} 50 ${baseY}
          T 100 ${baseY}
          L 100 100
          Z
        `;
        return d;
      }

      trigger() {
        if (this.isAnimating) return;
        this.isAnimating = true;
        this.progress = 0;
        
        // 色をアクセントカラーに合わせる
        const rootStyles = getComputedStyle(document.documentElement);
        this.path.setAttribute('fill', rootStyles.getPropertyValue('--accent').trim() || '#00ffcc');
        
        this.svg.setAttribute('viewBox', '0 0 100 100');

        this.animateIn();
      }

      animateIn = () => {
        this.progress += 0.02; // スピード調整
        if (this.progress > 1) this.progress = 1;
        
        this.path.setAttribute('d', this.getPath(this.progress));
        
        if (this.progress < 1) {
          requestAnimationFrame(this.animateIn);
        } else {
          // 画面が完全に覆われた状態。ここで本来は next_page.html 等へ遷移する。
          // 今回はデモのため、少し待ってから波を下げて元に戻す。
          setTimeout(() => this.animateOut(), 500);
        }
      }

      animateOut = () => {
        this.progress += 0.02; // progressを1〜2まで進める（計算を変えて下げる）
        if (this.progress > 2) this.progress = 2;
        
        // 下げる時のパス計算 (上から下へ抜けていくイメージ)
        const outProg = this.progress - 1; // 0 -> 1
        const easeOutProg = Math.pow(outProg, 2);
        const topY = 100 * easeOutProg;
        const waveHeight = Math.sin(outProg * Math.PI) * 20;

        // 左上(0,0) -> 波打ちながら右上(100,0) -> 右下(100,100) -> 左下(0,100) -> ... の逆で、黒い部分が下へ逃げる
        const d = `
          M 0 0
          L 0 ${topY}
          Q 25 ${topY + waveHeight} 50 ${topY}
          T 100 ${topY}
          L 100 0
          Z
        `;
        
        this.path.setAttribute('d', d);

        if (this.progress < 2) {
          requestAnimationFrame(this.animateOut);
        } else {
          this.path.setAttribute('d', ''); // リセット
          this.isAnimating = false;
        }
      }
    }

    // =========================================
    // Bootstrapping
    // =========================================
    document.addEventListener('DOMContentLoaded', () => {
      // 1. Cursor & Magnetic
      new CursorController();

      // 2. Kinetic Text Particle
      new TextParticleEngine('hero-canvas', 'hero-title');

      // 3. Kinetic 3D Cards
      document.querySelectorAll('.ak2-kinetic-card').forEach(el => {
        new KineticCard(el);
      });

      // 4. Page Transition
      new TransitionManager('btn-transition', 'transition-svg', 'transition-path');
    });

  </script>
</body>
</html>
